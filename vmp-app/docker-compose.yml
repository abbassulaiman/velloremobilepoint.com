version: '3.9'

services:

  # ── Database ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: vmp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-vmproot123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vmp_db}
      MYSQL_USER: ${MYSQL_USER:-vmpuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vmppass123}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD:-vmproot123}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── phpMyAdmin (dev convenience) ─────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: vmp_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-vmpuser}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-vmppass123}
    ports:
      - '8080:80'
    depends_on:
      mysql:
        condition: service_healthy

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vmp_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 9200
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-vmp_db}
      DB_USER: ${MYSQL_USER:-vmpuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-vmppass123}
    ports:
      - '9200:9200'
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:9200/api/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend (Nuxt SSR) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The browser calls this URL — use the public IP/domain in production
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:9200/api}
        OWNER_WHATSAPP: ${OWNER_WHATSAPP:-919790599905}
    container_name: vmp_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 9100
      HOST: 0.0.0.0
    ports:
      - '9100:9100'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
